<div class="min-h-screen bg-[#0d0221] flex flex-col items-center justify-center relative font-sans px-4 overflow-hidden">
  
  <div class="grain-overlay"></div>

  <div class="absolute inset-0 pointer-events-none z-0">
    <div
      *ngFor="let b of floatingElements"
      class="floating-item absolute text-2xl opacity-40 blur-[1px]"
    >
      {{ b }}
    </div>
  </div>

  <div class="text-center z-10 max-w-sm mb-8">
    <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-500 drop-shadow-[0_0_15px_rgba(236,72,153,0.6)] mb-4">
      For The Past ❤️
    </h1>
    <div class="h-16 flex items-center justify-center">
      <p id="main-typewriter" class="text-pink-200 italic font-medium tracking-wide"></p>
    </div>
  </div>

  <div class="bottle-container relative z-10 cursor-pointer mb-12" (click)="showActionButton()">
    <img
      src="let.png"
      class="w-48 md:w-64 object-contain drop-shadow-[0_0_30px_rgba(236,72,153,0.3)] hover:scale-110 transition-transform duration-700"
      alt="Message in a Bottle"
    />
  </div>

  <div
    class="z-20 opacity-0 transition-all duration-1000 transform"
    [ngClass]="{ 'opacity-100 translate-y-[-10px]': showButton }"
    id="action-btn"
  >
    <p-button
      label="Open The Memories"
      icon="pi pi-heart-fill"
      [raised]="true"
      styleClass="p-button-lg px-10 py-4 bg-gradient-to-r from-pink-600 to-purple-600 border-none shadow-[0_0_20px_rgba(219,39,119,0.5)] hover:scale-105 transition-all"
      (onClick)="openSpecialDialog()"
    ></p-button>
  </div>

  <p-dialog
    [(visible)]="showMessage"
    [modal]="true"
    [draggable]="false"
    [closable]="true"
    [style]="{ width: '95vw', maxWidth: '500px', borderRadius: '20px' }"
    styleClass="glass-dialog"
  >
    <div class="flex flex-col items-center text-center p-2 bg-transparent">
      <div class="w-full mb-6 overflow-hidden rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-pink-500/30">
        <div class="aspect-video">
          <iframe
            *ngIf="showMessage"
            class="w-full h-full"
            [src]="videoUrl"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen
          ></iframe>
        </div>
      </div>

      <p id="dialog-typewriter" class="text-pink-100 text-base md:text-lg leading-relaxed italic px-4 min-h-[140px] drop-shadow-sm">
      </p>
    </div>
  </p-dialog>
</div>
